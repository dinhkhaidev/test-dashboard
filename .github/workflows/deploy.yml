name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Set env vars
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: |
          echo "SUPABASE_URL_LEN=${#SUPABASE_URL}"
          echo "SUPABASE_KEY_LEN=${#SUPABASE_KEY}"

      - name: Replace placeholders
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: |
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" index.html
          sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" index.html

      - name: Verify replacement
        run: |
          grep "__SUPABASE_URL__" index.html && echo "URL NOT REPLACED" || echo "URL replaced OK"
          grep "__SUPABASE_KEY__" index.html && echo "KEY NOT REPLACED" || echo "KEY replaced OK"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5