name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          sed -i 's|__SUPABASE_URL__|${{ secrets.VITE_SUPABASE_URL }}|g' index.html
          sed -i 's|__SUPABASE_KEY__|${{ secrets.VITE_SUPABASE_KEY }}|g' index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
