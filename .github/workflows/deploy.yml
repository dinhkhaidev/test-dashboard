name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Replace placeholders with envsubst
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: |
          export SUPABASE_URL SUPABASE_KEY
          envsubst < index.html > index.html.tmp && mv index.html.tmp index.html

      - name: Verify replacement
        run: |
          grep "__SUPABASE" index.html && echo "NOT ALL REPLACED" || echo "ALL REPLACED OK"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5